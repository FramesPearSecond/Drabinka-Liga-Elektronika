<!DOCTYPE html>
<html lang="pl-PL">
	<head>
		<meta charset="UTF-8" />
		<title>Drabinka - Liga elektornika</title>
		<meta name="author" content="FramesPearSecond" />
		<link rel="icon" type="image/x-icon" href="Elektronik-logo.ico" />
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<header class="falling-container">
			<h1>Liga Elektronika</h1>
		</header>
		<img id="logo" src="Elektronik logo 60.png" />
		<form id="adding">
			<input type="text" id="input" autocomplete="off"/>
			<button id="add">+</button>
		</form>
		<section>
			<div id="level1" class="brackets"></div>
            <div id="level2" class="brackets"></div>
		</section>
		<script>
			function createMatch(idA, nameA, idB, nameB) {
				let div = document.createElement("div");

				let teamA = document.createElement("input");
				let teamB = document.createElement("input");

				let labelA = document.createElement("label");
				let labelB = document.createElement("label");

				let spanA = document.createElement("span");
				let spanB = document.createElement("span");

				let vs = document.createElement("span");
				vs.innerText = "VS";

				teamA.value = nameA || "";
				spanA.innerText = idA + "/16";
				// labelA.appendChild(spanA);
				labelA.appendChild(teamA);

				teamB.value = nameB || "";
				// spanB.innerText = idB + ".";
				// labelB.appendChild(spanB);
				labelB.appendChild(teamB);

                // div.appendChild(spanA);
				div.appendChild(labelA);
				div.appendChild(vs);
				div.appendChild(labelB);

				div.className = "match";

				return div;
			}

			function updateTeamsFromDOM() {
				// Read all current input values from the DOM and reconstruct the teams array
				let updatedTeams = new Array(28);
				let level1 = document.getElementById("level1");
				let level2 = document.getElementById("level2");

				// Get all matches from level2 lucky section (first 4 matches)
				let level2Matches = level2.querySelectorAll(".match.lucky");
				for (let i = 0; i < 4 && i < level2Matches.length; i++) {
					let inputs = level2Matches[i].querySelectorAll("input");
					if (inputs[0]) updatedTeams[i] = inputs[0].value;
					// Extract team names from the "text" format (name1 / name2)
					if (inputs[1]) {
						let parts = inputs[1].value.split(" / ");
						updatedTeams[2 * i + 4] = parts[0] || "";
						updatedTeams[2 * i + 5] = parts[1] || "";
					}
				}

				// Get all matches from level2 additional section (next 4 matches)
				let level2AdditionalMatches = level2.querySelectorAll(".match.additional");
				for (let i = 0; i < 4 && i < level2AdditionalMatches.length; i++) {
					let inputs = level2AdditionalMatches[i].querySelectorAll("input");
					let currentI = 5 + i;
					if (inputs[0]) {
						let parts = inputs[0].value.split(" / ");
						updatedTeams[4 * currentI - 7] = parts[0] || "";
						updatedTeams[4 * currentI - 8] = parts[1] || "";
					}
					if (inputs[1]) {
						let parts = inputs[1].value.split(" / ");
						updatedTeams[4 * currentI - 6] = parts[0] || "";
						updatedTeams[4 * currentI - 5] = parts[1] || "";
					}
				}

				// Get all matches from level1
				let level1Matches = level1.querySelectorAll(".match");
				let matchIndex = 0;
				for (let i = 4; i < 28 && matchIndex < level1Matches.length; i += 2) {
					let inputs = level1Matches[matchIndex].querySelectorAll("input");
					if (inputs[0]) updatedTeams[i] = inputs[0].value;
					if (inputs[1]) updatedTeams[i + 1] = inputs[1].value;
					matchIndex++;
				}

				return updatedTeams;
			}

			function display(teams) {
				let level2 = document.getElementById("level2");
				level2.innerHTML = "";

				for (let i = 0; i < 4; i++) {
					let text = (teams[2 * i + 4] || "") + " / " + (teams[2 * i + 5] || "");

					let div = createMatch(i + 1, teams[i], "", text);
					div.className += " lucky";

					level2.appendChild(div);
				}

				for (let i = 5; i < 9; i++) {
					let textA = (teams[4 * i - 7] || "") + " / " + (teams[4 * i - 8] || "");
					let textB = (teams[4 * i - 6] || "") + " / " + (teams[4 * i - 5] || "");
					let div = createMatch("", textA, "", textB);
					div.className += " additional";
					level2.appendChild(div);
				}

				let level1 = document.getElementById("level1");
				level1.innerHTML = "";

				for (let i = 4; i < 28; i += 2) {
					let div = createMatch(i + 1, teams[i], i + 2, teams[i + 1]);

					level1.appendChild(div);
				}

				sessionStorage.setItem("Brackets", JSON.stringify(teams));
			}

			let addButton = document.getElementById("add");

			addButton.addEventListener("click", e => {
                e.preventDefault();
				// Update the teams array with any manual changes made in the input fields
				teams = updateTeamsFromDOM();

				let teamName = document.getElementById("input").value.toUpperCase();
				document.getElementById("input").value = "";

				// Find the first empty index in the teams array and set the team there
				for (let i = 0; i < 28; i++) {
					if (!teams[i] || teams[i] === "") {
						teams[i] = teamName;
						break;
					}
				}

				console.log(teams);

				display(teams);
			});

			let teams = [
                // "3D",
                // "2D",
                // "3C",
                // "3F",
                // "2G",
                // "2A",
                // "3I",
                // "5E",
                // "5G",
                // "4A",
                // "3B",
                // "2I",
                // "1E",
                // "2E",
                // "3H",
                // "5D",
                // "2C",
                // "1C",
                // "4F",
                // "4E",
                // "3G",
                // "5A",
                // "2H",
                // "3J",
                // "3E",
                // "3A",
                // "4D",
                // "2F"
            ]

			display(teams);

			document.addEventListener("DOMContentLoaded", function () {
				const header = document.querySelector(".falling-container");

				function createFallingBall() {
					const ball = document.createElement("img");
					ball.src = "volleyball.webp";
					ball.classList.add("falling-ball");
					const randomLeft = Math.random() * 90 + "%";
					const randomDuration = Math.random() * 2 + 2 + "s";
					const randomBlur = Math.random() * 5 + "px";
					const randomRotationSpeed = Math.random() * 2 + 1 + "s";
					const randomDirection = Math.random() < 0.5 ? "normal" : "reverse";

					// Apply styles
					ball.style.left = randomLeft;
					ball.style.animationDuration = `${randomDuration}, ${randomRotationSpeed}`;
					ball.style.animationTimingFunction = "linear, linear";
					ball.style.animationName = "fall, rotate";
					ball.style.animationDirection = `normal, ${randomDirection}`;
					ball.style.filter = `blur(${randomBlur})`;

					header.appendChild(ball);

					setTimeout(() => {
						ball.remove();
					}, 20 * 1000);
				}

				setInterval(createFallingBall, 3000);
			});
		</script>
	</body>
</html>
